name: Release Desktop Installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        default: v1.0.1

permissions:
  contents: write

jobs:
  macos:
    name: macOS universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node scripts/prepare-electron-build.cjs
      - run: npx electron-builder --mac dmg --arm64 --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - run: node scripts/write-checksums.cjs release SHA256SUMS-macos.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          overwrite_files: true
          files: |
            release/*.dmg
            release/*.dmg.blockmap
            release/SHA256SUMS-macos.txt

  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ia32]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node scripts/prepare-electron-build.cjs
      - run: npx electron-builder --win nsis --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - run: node scripts/write-checksums.cjs release SHA256SUMS-windows-${{ matrix.arch }}.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          overwrite_files: true
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/SHA256SUMS-windows-${{ matrix.arch }}.txt

  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node scripts/prepare-electron-build.cjs
      - run: npx electron-builder --linux AppImage deb --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - run: node scripts/write-checksums.cjs release SHA256SUMS-linux.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          overwrite_files: true
          files: |
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/SHA256SUMS-linux.txt
